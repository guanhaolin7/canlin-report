<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#2f0b66">
  <title>股貨宅CanLin｜戰略情報簡報｜2026/06/12</title>
  <meta name="description" content="股貨宅CanLin｜戰略情報簡報 2026/06/12 盤後整合 IG Research Cards">
  <style>
    :root {
      --purple: #2f0b66;
      --purple-2: #4d1796;
      --green: #04b35c;
      --bg: #f7f6fb;
      --text: #1d1435;
      --muted: #6f6683;
      --card: #ffffff;
      --border: rgba(47, 11, 102, .16);
      --shadow: 0 18px 45px rgba(26, 12, 62, .12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 20% 0%, rgba(4,179,92,.12), transparent 28rem),
        radial-gradient(circle at 85% 8%, rgba(77,23,150,.12), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", Arial, sans-serif;
      line-height: 1.5;
    }
    .topline { height: 8px; background: linear-gradient(90deg, var(--purple), var(--purple-2) 70%, var(--green)); }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(16px);
      background: rgba(247,246,251,.82);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 14px 18px 12px;
      display: grid;
      gap: 10px;
    }
    .brand-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .brand { font-weight: 900; color: var(--purple); letter-spacing: .02em; }
    .date { color: var(--muted); font-size: .92rem; }
    .pill {
      background: var(--purple);
      color: white;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: .82rem;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(47,11,102,.18);
    }
    .nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .nav::-webkit-scrollbar { display: none; }
    .nav a {
      min-width: 42px;
      text-align: center;
      text-decoration: none;
      color: var(--purple);
      border: 1px solid var(--border);
      background: white;
      border-radius: 999px;
      padding: 6px 10px;
      font-weight: 800;
    }
    main { max-width: 1180px; margin: 0 auto; padding: 24px 14px 56px; }
    .hero {
      margin: 0 4px 20px;
      padding: 20px;
      border-radius: 24px;
      background: linear-gradient(135deg, rgba(255,255,255,.92), rgba(255,255,255,.7));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    h1 { margin: 0 0 6px; color: var(--purple); font-size: clamp(1.55rem, 5vw, 2.55rem); line-height: 1.08; }
    .hero p { margin: 0; color: var(--muted); font-weight: 650; }
    .accent { color: var(--green); font-weight: 900; }
    .deck { display: grid; gap: 28px; justify-items: center; }
    .card {
      margin: 0;
      width: min(100%, 1080px);
      border-radius: 28px;
      overflow: hidden;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .card img { display: block; width: 100%; height: auto; }
    footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 18px 36px;
      color: var(--muted);
      font-size: .88rem;
    }
    .download-note {
      margin-top: 18px;
      padding: 14px 16px;
      border-left: 5px solid var(--green);
      background: rgba(4,179,92,.08);
      border-radius: 12px;
    }
    @media (min-width: 900px) {
      .deck { gap: 36px; }
      main { padding-top: 32px; }
    }
  </style>
</head>
<body>

</html>
