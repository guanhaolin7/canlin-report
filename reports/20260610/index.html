<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股貨宅CanLin｜戰略情報簡報｜2026.06.10</title>
  <style>
    :root{--bg:#f7f8fc;--card:#ffffff;--ink:#080b22;--purple:#24105F;--accent:#4B19D8;--green:#9DFF2E;}
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:1180px;margin:0 auto;padding:24px 16px 48px}
    .hero{background:linear-gradient(135deg,#ffffff 0%,#f2edff 100%);border:1px solid #e6e0ff;border-radius:24px;padding:24px 24px 18px;box-shadow:0 10px 30px rgba(36,16,95,.08);margin-bottom:20px}
    h1{margin:0 0 8px;font-size:34px;line-height:1.15;color:var(--purple)}
    .sub{margin:0;font-size:16px;color:#4c5573}
    .grid{display:grid;grid-template-columns:1fr;gap:18px}
    .page{background:var(--card);border-radius:22px;box-shadow:0 8px 24px rgba(36,16,95,.08);padding:14px;border:1px solid #ebe7ff}
    .badge{display:inline-block;background:var(--accent);color:#fff;border-radius:999px;padding:8px 14px;font-weight:800;margin:4px 0 10px}
    img{display:block;width:100%;height:auto;border-radius:14px}
    footer{margin-top:20px;text-align:center;color:#5f637a;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>股貨宅CanLin｜戰略情報簡報</h1>
      <p class="sub">GitHub Pages deploy-ready 版本｜固定順序輸出｜2026.06.10</p>
    </section>
    <main class="grid">
      <section class="page"><div class="badge">page01</div><img src="assets/page01.jpg" alt="page01"></section>
      <section class="page"><div class="badge">page02</div><img src="assets/page02.jpg" alt="page02"></section>
      <section class="page"><div class="badge">page03</div><img src="assets/page03.jpg" alt="page03"></section>
      <section class="page"><div class="badge">page04</div><img src="assets/page04.jpg" alt="page04"></section>
      <section class="page"><div class="badge">page05</div><img src="assets/page05.jpg" alt="page05"></section>
      <section class="page"><div class="badge">page06</div><img src="assets/page06.jpg" alt="page06"></section>
      <section class="page"><div class="badge">page07</div><img src="assets/page07.jpg" alt="page07"></section>
      <section class="page"><div class="badge">page08</div><img src="assets/page08.jpg" alt="page08"></section>
    </main>
    <footer>Assets 已固定命名為 page01～page08，index.html 依固定順序引用。</footer>
  </div>
</body>
</html>
